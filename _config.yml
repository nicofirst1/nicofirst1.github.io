lang: en
url: "https://nicolobrandizzi.com"
baseurl: "" # user site => empty
title: "Nicolo' Brandizzi"
description: "Personal website of Dr. Nicolo' Brandizzi — AI researcher exploring reinforcement learning, multi-agent systems, and responsible AI."

plugins:
  - jekyll-postcss-v2
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

sass:
  sass_dir: _scss

# OUTPUT: let Actions upload _site (don’t write to docs/)
destination: _site

collections:
  blog:
    output: true
    permalink: /blog/:slug/
  news:
    output: true
    permalink: /:collection/:slug/
  projects:
    output: true
    permalink: /:collection/:title/
  pages:
    output: true
    permalink: /:title/
  education:
    output: false
  certificates:
    output: false
  experience:
    output: false
  secret_drafts:
    output: true
    permalink: /secret-drafts/:slug/

defaults:
  - scope: { path: "_news" }
    values: { layout: "news" }
  - scope: { path: "_blog", type: blog }
    values: { layout: "blogs" }

# Email obfuscation: to change, run: echo -n "your@email.com" | base64
email_b64: "bmljb2xvLmJyYW5kaXp6aUBpYWlzLmZyYXVuaG9mZXIuZGU="

exclude:
  - node_modules
  - _site
  - docs
  - package-lock.json
  - yarn.lock
