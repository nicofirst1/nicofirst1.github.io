<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180"
    href="{{ site.baseurl }}/assets/images/website-logos/icon-apple-touch.png">
  <link rel="icon" type="image/png" sizes="32x32"
    href="{{ site.baseurl }}/assets/images/website-logos/icon-favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16"
    href="{{ site.baseurl }}/assets/images/website-logos/icon-favicon-16.png">
  <link rel="manifest" href="{{ site.baseurl }}/site.webmanifest">
  {%- if page.style -%}
  <link rel="stylesheet" href="{{ page.style | relative_url }}">
  {%- endif -%}

  <!-- Conditionally load Google Analytics (non-localhost only) -->
  <script>
    (function() {
      var host = window.location.hostname;
      if (host === "localhost" || host === "127.0.0.1") return;

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());

      var gaScript = document.createElement('script');
      gaScript.async = true;
      gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-W2MPFHELZG';
      document.head.appendChild(gaScript);
      gaScript.onload = function () { gtag('config', 'G-W2MPFHELZG'); };
    })();
  </script>

  <!-- Bot + Human detection (deferred — no need to block rendering) -->
  <script src="/assets/js/bot_detection.js" defer></script>

  <!-- Mailchimp Signup Form (deferred) -->
  <script defer src="https://chimpstatic.com/mcjs-connected/js/users/a4ec8d76c6a8f3dbf860aed02/2254c462cd60bbbb345158f12.js"></script>

  <!-- GSAP and ScrollTrigger for scroll animations -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
  <script src="/assets/js/gsap-scroll-animations.js" defer></script>
</head>
