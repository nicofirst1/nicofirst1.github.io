---
layout: default
---

<main class="news-post  min-h-[88vh]" data-gsap-section="detail-page">
  <section class="detail_section">
    <div class="container mb-20">
      <h1 class="text-5xl font-bold" style="will-change: transform, opacity;">{{page.title}}</h1>
      <b style="will-change: opacity;">{{page.subtitle}}</b>
      <p class="text-sm mb-3" style="will-change: opacity;">{{page.date | date: "%b %d, %Y" }}</p>
      <div class="project-image" style="will-change: transform, opacity;">
        <img src="{{page.image}}" alt="hero image" class="w-full md:pr-8 pb-8 md:w-1/2 xl:w-1/3 float-left">
      </div>
      <div class="page_content" style="will-change: opacity;">{{content}}</div>

      {% if page.button_name %}
      <div class="text-right mt-4 ">
        <a href="{{page.button_link}}" target="_blank" rel="noopener noreferrer" class="read-more-btn">
          {{page.button_name}}
        </a>
      </div>
      {% endif %}
    </div>
  </section>
</main>
